<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Yeraltı Adamı</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
  }

  /* ── Game container ── */
  #game {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000;
    user-select: none;
    font-family: 'Georgia', serif;
    overflow: hidden;
  }

  /* ── Scenes ── */
  .scene {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    transition: opacity 0.5s ease;
  }
  .scene.hidden  { opacity: 0; pointer-events: none; }
  .scene.visible { opacity: 1; pointer-events: all; }
  .scene img.bg  { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* ── SVG hotspot overlay ── */
  .hotspot-svg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .hotzone {
    pointer-events: all;
    cursor: pointer;
    fill: rgba(255,200,80,0);
    transition: fill 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  /* Touch feedback */
  .hotzone.touched { fill: rgba(255,200,80,0.18); }

  /* ── Tap label (mobilde hover yok, tap'te göster) ── */
  .tap-label {
    position: absolute;
    background: rgba(10,7,3,0.88);
    color: #f5d68a;
    padding: 6px 14px;
    border-radius: 6px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    border: 0.5px solid rgba(245,200,100,0.35);
    white-space: nowrap;
    transform: translate(-50%, -150%);
    z-index: 5;
    font-family: sans-serif;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-size: clamp(9px, 2.5vw, 13px);
  }
  .tap-label.visible { opacity: 1; }

  /* ── Dialog kutusu ── */
  .dialog-box {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(4,2,1,0.98) 55%, transparent);
    padding: 20px 20px 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    pointer-events: none;
    z-index: 15;
    min-height: 28%;
  }
  .dialog-box.visible { opacity: 1; transform: translateY(0); pointer-events: all; }

  .dialog-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .dialog-speaker {
    font-family: sans-serif;
    font-size: clamp(9px, 2.8vw, 13px);
    color: #f5d68a;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.75;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dialog-text {
    color: #ecdfc0;
    font-size: clamp(12px, 3.2vw, 17px);
    line-height: 1.7;
    font-style: italic;
  }
  .dialog-close {
    font-family: sans-serif;
    background: rgba(245,200,100,0.08);
    border: 0.5px solid rgba(245,200,100,0.35);
    color: #f5d68a;
    font-size: clamp(11px, 3vw, 15px);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    align-self: flex-end;
    min-width: 44px; min-height: 44px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .dialog-close:active { background: rgba(245,200,100,0.2); }

  /* ── Ses göstergesi ── */
  .audio-indicator {
    display: inline-flex;
    gap: 3px;
    align-items: flex-end;
    height: 14px;
    vertical-align: middle;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .audio-indicator.playing { opacity: 1; }
  .audio-indicator span { display: block; width: 3px; background: #f5d68a; border-radius: 2px; }
  .audio-indicator.playing span { animation: bar 0.7s ease-in-out infinite alternate; }
  .audio-indicator span:nth-child(1) { animation-delay: 0s;    height: 5px; }
  .audio-indicator span:nth-child(2) { animation-delay: 0.15s; height: 10px; }
  .audio-indicator span:nth-child(3) { animation-delay: 0.3s;  height: 7px; }
  .audio-indicator span:nth-child(4) { animation-delay: 0.1s;  height: 12px; }
  @keyframes bar { from { transform: scaleY(0.4); } to { transform: scaleY(1.3); } }

  /* ── Back butonu ── */
  .back-btn {
    position: absolute;
    top: 16px; left: 16px;
    background: rgba(20,12,4,0.82);
    color: #f5d68a;
    border: 0.5px solid rgba(245,200,100,0.4);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: clamp(12px, 3.5vw, 16px);
    cursor: pointer;
    z-index: 25;
    font-family: sans-serif;
    min-width: 44px; min-height: 44px;
    display: flex; align-items: center; gap: 6px;
    -webkit-tap-highlight-color: transparent;
  }
  .back-btn:active { background: rgba(40,24,6,0.95); }

  /* ── Scene label ── */
  .scene-lbl {
    position: absolute;
    top: 16px; right: 16px;
    background: rgba(20,12,4,0.75);
    color: rgba(245,200,100,0.6);
    font-size: clamp(9px, 2.5vw, 12px);
    padding: 6px 12px;
    border-radius: 6px;
    pointer-events: none;
    letter-spacing: 0.05em;
    font-family: sans-serif;
    z-index: 10;
  }

  /* ── Flash ── */
  .flash {
    position: absolute;
    inset: 0;
    background: #000;
    pointer-events: none;
    opacity: 0;
    z-index: 30;
    transition: opacity 0.15s;
  }
  .flash.go { opacity: 1; }

  /* ── Portrait mod uyarısı ── */
  #rotate-hint {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: #f5d68a;
    font-family: sans-serif;
    font-size: clamp(14px, 4vw, 20px);
    letter-spacing: 0.05em;
    text-align: center;
    padding: 24px;
  }
  #rotate-hint .icon { font-size: 48px; animation: rotate-anim 1.5s ease-in-out infinite; }
  @keyframes rotate-anim {
    0%,100% { transform: rotate(0deg); }
    50%      { transform: rotate(90deg); }
  }
  @media (orientation: portrait) and (max-width: 768px) {
    #rotate-hint { display: flex; }
  }
</style>
</head>
<body>

<!-- Arka plan müziği (loop) -->
<audio id="bg-music" src="music.mp3" loop preload="auto"></audio>

<!-- Portrait uyarısı -->
<div id="rotate-hint">

    <div id="dialog2" class="dialog-box">

    <div id="dialog3" class="dialog-box">
      <div class="dialog-header">
        <div class="dialog-speaker">&#9632; Yeraltı Adamı <div id="audio3" class="audio-indicator"><span></span><span></span><span></span><span></span></div></div>
        <button class="dialog-close">&#10005;</button>
      </div>
      <div id="dialog3-text" class="dialog-text"></div>
    </div>
  </div>

  <!-- SCENE 4: Palto -->
  <div id="scene4" class="scene hidden">
    <img id="img4" class="bg" alt="Palto" draggable="false" />
    <button class="back-btn" data-to="1">&#8592; Geri</button>
    <div class="scene-lbl">Coat &amp; Hat</div>
    <div id="dialog4" class="dialog-box">
      <div class="dialog-header">
        <div class="dialog-speaker">&#9632; Yeraltı Adamı <div id="audio4" class="audio-indicator"><span></span><span></span><span></span><span></span></div></div>
        <button class="dialog-close">&#10005;</button>
      </div>
      <div id="dialog4-text" class="dialog-text"></div>
    </div>
  </div>

  <!-- SCENE 5: Liza -->
  <div id="scene5" class="scene hidden">
    <img id="img5" class="bg" alt="Liza" draggable="false" />
    <button class="back-btn" data-to="2">&#8592; Geri</button>
    <div class="scene-lbl">Liza</div>
    <div id="dialog5" class="dialog-box">
      <div class="dialog-header">
        <div class="dialog-speaker">&#9632; Yeraltı Adamı <div id="audio5" class="audio-indicator"><span></span><span></span><span></span><span></span></div></div>
        <button class="dialog-close">&#10005;</button>
      </div>
      <div id="dialog5-text" class="dialog-text"></div>
    </div>
  </div>

  <!-- SCENE 6: Kitaplık -->
  <div id="scene6" class="scene hidden">
    <img id="img6" class="bg" alt="Kitaplık" draggable="false" />
    <button class="back-btn" data-to="1">&#8592; Geri</button>

    <div id="dialog6" class="dialog-box">
      <div class="dialog-header">
        <div class="dialog-speaker">&#9632; Yeraltı Adamı <div id="audio6" class="audio-indicator"><span></span><span></span><span></span><span></span></div></div>
        <button class="dialog-close">&#10005;</button>
      </div>
      <div id="dialog6-text" class="dialog-text"></div>
    </div>
  </div>

  <div class="flash" id="flash"></div>
</div>

<script>
// ── Arka plan müziği (loop) ──────────────────────────────────
const bgMusic = document.getElementById('bg-music');
bgMusic.volume = 0.45;
bgMusic.loop = true;

function startBgMusic() {
  bgMusic.play().catch(() => {});
}

// Otomatik oynatmayı dene (modern tarayıcılarda muhtemelen engellenir)
window.addEventListener('load', startBgMusic);

// İlk kullanıcı etkileşiminde başlat (autoplay engeli için fallback)
function unlockMusic() {
  startBgMusic();
  if (!bgMusic.paused) {
    window.removeEventListener('touchstart', unlockMusic, true);
    window.removeEventListener('mousedown',  unlockMusic, true);
    window.removeEventListener('keydown',    unlockMusic, true);
  }
}
window.addEventListener('touchstart', unlockMusic, true);
window.addEventListener('mousedown',  unlockMusic, true);
window.addEventListener('keydown',    unlockMusic, true);

// Sekme görünür olduğunda devam ettir
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) startBgMusic();
});

const SCENE_DATA = {
  2: { text: 'İşte benim zihnimin kusmuğu. Ne eksik, ne fazla. Dışarıdaki o aptal, o "normal" insanların düzenli masalarına inat, benim yeraltı dünyamın anıtı.', audio: null },
  3: { text: 'Bakınız, beyefendi çıkmış sarp bir kayalığın tepesine, dünyaya o yoğun sis denizinin üzerinden hükmediyor. Bir fatih, bir filozof, yüce bir doğa hakimi! Ne kadar da asil bir duruş, değil mi? Ona baktıkça içimdeki saf hınç fokurdamaya başlıyor. O adam, benim olmak isteyip de kendi hastalıklı korkaklığım yüzünden asla olamadığım o iğrenç "ideal" romantiğin ta kendisi.', audio: null },
  4: { text: 'Üzerine sinmiş o keskin rutubet kokusu, benim yeraltına ait olduğumu herkese bağıran bir işaret fişeği sanki.', audio: null },
  5: { text: '', audio: null },
  6: { text: '', audio: null }
};

// ── Audio ────────────────────────────────────────────────────
let actx = null;
let currentAudio = null;

function getAudioCtx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  return actx;
}

function stopAudio() {
  if (currentAudio) { try { currentAudio.stop(); } catch(e){} currentAudio = null; }
  document.querySelectorAll('.audio-indicator').forEach(el => el.classList.remove('playing'));
}

function playPlaceholderVoice(text, indicatorEl) {
  stopAudio();
  const ctx = getAudioCtx();
  const words = text.split(' ').length;
  const duration = Math.min(words * 0.22, 12);
  const bufSize = ctx.sampleRate * duration;
  const buffer = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    const t = i / ctx.sampleRate;
    const env = Math.sin(Math.PI * (i / bufSize));
    const wrd = Math.abs(Math.sin(t * 4.2));
    data[i] = Math.sin(2 * Math.PI * (130 + 40 * Math.sin(t * 3.5)) * t) * env * wrd * 0.18;
  }
  const src = ctx.createBufferSource();
  const gain = ctx.createGain();
  const filt = ctx.createBiquadFilter();
  filt.type = 'bandpass'; filt.frequency.value = 900; filt.Q.value = 1.2;
  src.buffer = buffer;
  src.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
  indicatorEl.classList.add('playing');
  src.start();
  src.onended = () => indicatorEl.classList.remove('playing');
  currentAudio = src;
}

function playRealAudio(path, indicatorEl) {
  stopAudio();
  const audio = new Audio(path);
  indicatorEl.classList.add('playing');
  audio.play().catch(()=>{});
  audio.onended = () => indicatorEl.classList.remove('playing');
  currentAudio = { stop: () => { audio.pause(); audio.currentTime = 0; } };
}

// ── Sahne geçişi ─────────────────────────────────────────────
const flash = document.getElementById('flash');
const scenes = {};
for (let i = 1; i <= 6; i++) scenes[i] = document.getElementById('scene' + i);
let current = 1;

function showDialog(sceneId) {
  const data = SCENE_DATA[sceneId];
  if (!data || !data.text) return;
  const box      = document.getElementById('dialog' + sceneId);
  const textEl   = document.getElementById('dialog' + sceneId + '-text');
  const audioInd = document.getElementById('audio' + sceneId);
  if (!box) return;
  textEl.textContent = data.text;
  box.classList.add('visible');
  if (data.audio) playRealAudio(data.audio, audioInd);
  else            playPlaceholderVoice(data.text, audioInd);
}

function hideAllDialogs() {
  stopAudio();
  document.querySelectorAll('.dialog-box').forEach(b => b.classList.remove('visible'));
}

function goTo(toId) {
  hideAllDialogs();
  hideAllTapLabels();
  flash.classList.add('go');
  setTimeout(() => {
    scenes[current].classList.remove('visible');
    scenes[current].classList.add('hidden');
    scenes[toId].classList.remove('hidden');
    scenes[toId].classList.add('visible');
    current = toId;
    flash.classList.remove('go');
    if (SCENE_DATA[toId] && SCENE_DATA[toId].text) setTimeout(() => showDialog(toId), 450);
  }, 160);
}

// ── Tap label ────────────────────────────────────────────────
function hideAllTapLabels() {
  document.querySelectorAll('.tap-label').forEach(l => l.classList.remove('visible'));
}

let labelTimer = null;

function showTapLabel(labelEl, text, x, y) {
  hideAllTapLabels();
  clearTimeout(labelTimer);
  labelEl.textContent = text;
  labelEl.style.left = x + 'px';
  labelEl.style.top  = y + 'px';
  labelEl.classList.add('visible');
  labelTimer = setTimeout(() => labelEl.classList.remove('visible'), 1800);
}

// ── Hotspot binding (touch + mouse) ──────────────────────────
const game = document.getElementById('game');

function bindHotspot(zoneId, label, targetScene, labelElId) {
  const zone    = document.getElementById(zoneId);
  const labelEl = document.getElementById(labelElId);
  if (!zone) return;

  let tapCount = 0;
  let tapTimer = null;

  function handleInteraction(clientX, clientY) {
    const rect = game.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;

    if (tapCount === 0) {
      // İlk dokunuş: etiketi göster
      showTapLabel(labelEl, label, x, y);
      zone.classList.add('touched');
      setTimeout(() => zone.classList.remove('touched'), 300);
      tapCount = 1;
      tapTimer = setTimeout(() => { tapCount = 0; }, 1800);
    } else {
      // İkinci dokunuş veya hemen art arda: sahneye geç
      clearTimeout(tapTimer);
      tapCount = 0;
      if (actx) actx.resume();
      else getAudioCtx();
      goTo(targetScene);
    }
  }

  // Touch
  zone.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const t = e.changedTouches[0];
    handleInteraction(t.clientX, t.clientY);
  }, { passive: false });

  // Mouse (masaüstü uyumluluğu için)
  zone.addEventListener('click', (e) => {
    handleInteraction(e.clientX, e.clientY);
  });
}

// Scene 1
bindHotspot('zone-desk',      'Examine Desk',        2, 'tap-label-s1');
bindHotspot('zone-painting',  'Examine Painting',    3, 'tap-label-s1');
bindHotspot('zone-hanger',    'Examine Coat Hanger', 4, 'tap-label-s1');
bindHotspot('zone-bookshelf', 'Examine Bookshelf',   6, 'tap-label-s1');

// Scene 2
bindHotspot('zone-liza', 'Examine Photograph', 5, 'tap-label-s2');

// ── Geri & kapat ─────────────────────────────────────────────
document.querySelectorAll('.back-btn').forEach(btn => {
  btn.addEventListener('click',      () => { hideAllDialogs(); goTo(parseInt(btn.dataset.to)); });
  btn.addEventListener('touchstart', (e) => { e.preventDefault(); hideAllDialogs(); goTo(parseInt(btn.dataset.to)); }, { passive: false });
});

document.querySelectorAll('.dialog-close').forEach(btn => {
  btn.addEventListener('click',      hideAllDialogs);
  btn.addEventListener('touchstart', (e) => { e.preventDefault(); hideAllDialogs(); }, { passive: false });
});

// Boş alana tap → etiket ve diyalog kapat
game.addEventListener('touchstart', (e) => {
  if (!e.target.closest('.hotzone, .back-btn, .dialog-box, .dialog-close')) {
    hideAllTapLabels();
  }
});
</script>
</body>
</html>
